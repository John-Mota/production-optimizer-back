# ----------------------------------------
# GLOBAL SERVLET PATH
# ----------------------------------------
# Sets a global prefix for the entire application.
# All controllers and endpoints will be under /api.
spring.mvc.servlet.path=/api

# ----------------------------------------
# DATABASE CONNECTION (SUPABASE - POSTGRESQL)
# ----------------------------------------
# JDBC URL for the Supabase PostgreSQL instance.
# The 'sslmode=require' parameter is mandatory for Supabase connections.
# The 'prepareThreshold=0' parameter disables server-side prepared statements,
# which is required to prevent conflicts with PgBouncer.
spring.datasource.url=${DB_URL}&prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# JPA / HIBERNATE
# ----------------------------------------
# 'update' automatically updates the database schema based on entity changes.
# Use 'validate' in production for safety.
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console for debugging purposes.
spring.jpa.show-sql=true

# ----------------------------------------
# CONNECTION POOL (HIKARI)
# ----------------------------------------
# Set the maximum pool size. Supabase PgBouncer recommends a smaller pool size.
# 10 is a reasonable value for many applications.
spring.datasource.hikari.maximum-pool-size=10
# Disable prepared statement caching to prevent "prepared statement S_1 does not exist" errors with PgBouncer.
spring.datasource.hikari.prepare-statement-cache.enabled=false

# ----------------------------------------
# SWAGGER / OPENAPI
# ----------------------------------------
# The path is now relative to the global servlet path (/api).
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
