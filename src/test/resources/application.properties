# ----------------------------------------
# TEST DATABASE CONFIGURATION (H2)
# ----------------------------------------
# Use an in-memory H2 database for running tests to avoid dependency on external databases.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----------------------------------------
# JPA / HIBERNATE FOR TESTS
# ----------------------------------------
# 'create-drop' ensures that the schema is created from scratch for each test run
# and dropped afterwards, providing a clean and isolated environment.
spring.jpa.hibernate.ddl-auto=create-drop

# Disable showing SQL in tests for cleaner logs, unless needed for debugging.
spring.jpa.show-sql=false
